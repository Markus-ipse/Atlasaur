<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#2b1f12" />
    <title>Atlasaur</title>
    <script>
      // Set data-theme and the theme-color meta before React mounts so the
      // @theme override block in index.css applies on first paint and the
      // mobile chrome bar matches — avoids a flash of light theme for users
      // on system-dark or explicit-dark preference. The meta is later kept
      // in sync by useTheme when the user changes pref.
      //
      // SHARED CONTRACT: the storage key, accepted values, and fallback
      // behavior here MUST match src/theme.ts loadPref(). Module code can't
      // run before paint, so this duplication is intentional; keep both
      // sites in lockstep when changing either.
      (function () {
        try {
          var pref = localStorage.getItem("atlasaur:theme") || "system";
          var dark =
            pref === "dark" ||
            (pref === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "dark" : "light",
          );
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", dark ? "#0e0c08" : "#2b1f12");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding:16px;font:14px Hoefler Text,Garamond,serif;color:#2b1f12">
        Atlasaur needs JavaScript to draw the world map and run the game.
        Please enable it for this page.
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
